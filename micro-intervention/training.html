<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>微干预 - 每日训练</title>
  <style>
    /* Professional Design System Override */
    :root {
      --accent: #34C759;
      --accent-dark: #2DBE48;
      --accent-light: #E8F8ED;
      --bg: #F8F9FA;
      --card: #FFFFFF;
      --text-primary: #1D1D1F;
      --text-secondary: #6E6E73;
      --text-hint: #AEAEB2;
      --border: #E5E5E7;
      --blue: #007AFF;
      --blue-light: #E5F2FF;
      --orange: #FF9500;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.06), 0 12px 40px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-lg: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background: #F7F4F0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }

    .phone-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--bg);
      position: relative;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      font-size: 13px;
      font-weight: 600;
      color: #FFFFFF;
    }
    .status-icons { display: flex; gap: 4px; font-size: 12px; }

    /* Top Nav */
    .top-nav {
      height: 52px;
      background: var(--card);
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .back-btn {
      width: 36px; height: 36px;
      border: none; background: var(--bg); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-size: 18px;
      color: var(--text-primary);
      transition: all 0.15s;
    }
    .back-btn:active { background: var(--border); }
    .nav-title {
      font-size: 16px; font-weight: 600;
      color: var(--text-primary); flex: 1;
      text-align: center;
      margin-right: 48px;
    }
    .nav-title span { color: var(--text-secondary); font-weight: 400; font-size: 14px; }

    /* Progress Bar */
    .progress-bar-wrap {
      height: 6px; background: var(--border); position: relative;
    }
    .progress-bar-fill {
      height: 100%; background: var(--accent);
      border-radius: 0 3px 3px 0;
      transition: width 0.4s ease;
    }

    /* Page Content */
    .page-content { padding: 16px 16px 140px; }

    /* Goal Card */
    .goal-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 18px 18px 16px;
      margin-bottom: 12px;
      animation: fadeInUp 0.4s ease both;
    }
    .goal-label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-secondary);
      font-weight: 500; margin-bottom: 8px;
    }
    .goal-label .icon { font-size: 16px; }
    .goal-text {
      font-size: 17px; font-weight: 600;
      color: var(--text-primary); line-height: 1.5;
    }
    .goal-tip { font-size: 12px; color: var(--text-secondary); margin-top: 8px; }

    /* Tip Card */
    .tip-card {
      background: #FFF8F0;
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex; align-items: flex-start; gap: 10px;
      animation: fadeInUp 0.4s 0.1s ease both;
    }
    .tip-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .tip-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

    /* Steps Section */
    .steps-section { animation: fadeInUp 0.4s 0.15s ease both; }
    .steps-label {
      font-size: 12px; color: var(--text-secondary);
      font-weight: 500; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .step-list { display: flex; flex-direction: column; gap: 10px; }

    /* Step Card */
    .step-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    .step-num {
      width: 28px; height: 28px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      color: var(--accent); flex-shrink: 0;
    }
    .step-card.completed .step-num {
      background: var(--accent);
      color: #fff;
    }
    .step-body { flex: 1; }
    .step-action {
      font-size: 15px; font-weight: 600;
      color: var(--text-primary); margin-bottom: 4px; line-height: 1.4;
    }
    .step-desc {
      font-size: 13px; color: var(--text-secondary); line-height: 1.5;
    }
    .step-duration {
      font-size: 12px; color: var(--text-secondary);
      margin-top: 6px; display: flex; align-items: center; gap: 4px;
    }

    /* Observe Card */
    .observe-card {
      background: var(--blue-light);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-top: 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: fadeInUp 0.4s 0.2s ease both;
    }
    .observe-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .observe-label {
      font-size: 11px;
      color: var(--blue);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .observe-text { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

    /* Loading State */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
    }
    .loading-icon { font-size: 44px; animation: pulse 1.5s infinite; }
    .loading-text { font-size: 14px; color: var(--text-secondary); margin-top: 16px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* Error State */
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
    }
    .error-icon { font-size: 56px; margin-bottom: 16px; }
    .error-title { font-size: 16px; font-weight: bold; color: var(--text-primary); margin-bottom: 8px; }
    .error-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
    .btn-retry {
      background: var(--card);
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: 14px;
      padding: 12px 24px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }

    /* Bottom Area */
    .bottom-area {
      position: fixed;
      bottom: 60px; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 12px 16px 20px;
      border-top: 1px solid var(--border);
      z-index: 99;
    }
    .done-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px 0;
      font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 12px rgba(52,199,89,0.35);
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .done-btn:active { background: var(--accent-dark); transform: scale(0.98); }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: 64px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 100;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; cursor: pointer;
      padding: 8px 0;
      color: var(--text-secondary);
      font-size: 11px; font-weight: 500;
      transition: color 0.2s;
    }
    .tab-item.active { color: var(--accent); }
    .tab-icon { font-size: 20px; line-height: 1; }
  </style>
</head>
<body>

<div class="phone-wrapper">
  <!-- Status Bar -->
  <div class="status-bar">
    <span id="currentTime">9:41</span>
    <div class="status-icons">📶 📡 🔋</div>
  </div>

  <!-- Top Nav -->
  <div class="top-nav">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="nav-title" id="navTitle">今日任务</div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="dayProgressBar"></div>
  </div>

  <!-- Page Content -->
  <div class="page-content" id="pageContent">
    <div class="loading-state" id="loadingState" style="display:none;">
      <div class="loading-icon">⏳</div>
      <div class="loading-text">加载中...</div>
    </div>

    <div class="error-state" id="errorState" style="display:none;">
      <div class="error-icon">😢</div>
      <div class="error-title">加载失败</div>
      <div class="error-desc" id="errorDesc">网络错误，请稍后重试</div>
      <button class="btn-retry" onclick="retryLoad()">重新加载</button>
    </div>

    <div id="trainingContent" style="display:none;">
      <div class="goal-card" id="goalCard">
        <div class="goal-label"><span class="icon">🎯</span><span>今日目标</span></div>
        <div class="goal-text" id="todayGoal">-</div>
        <div class="goal-tip" id="todayTip">💡 在孩子心情好的时候练习</div>
      </div>

      <div class="steps-section">
        <div class="steps-label">📋 今日步骤 (<span id="stepCount">0</span>步)</div>
        <div class="step-list" id="stepList"></div>
      </div>

      <div class="observe-card" id="observeCard">
        <div class="observe-icon">💡</div>
        <div>
          <div class="observe-label">重点观察</div>
          <div class="observe-text" id="observeText">-</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Button -->
  <div class="bottom-area" id="bottomArea" style="display:none;">
    <button class="done-btn" id="doneBtn" onclick="finishTraining()">
      <span>反馈效果</span>
    </button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item" onclick="switchTab('home')"><div class="tab-icon">👨‍👩‍👦</div><span>家长干预</span></div>
    <div class="tab-item" onclick="switchTab('practice')"><div class="tab-icon">🧒</div><span>孩子练习</span></div>
    <div class="tab-item" onclick="switchTab('me')"><div class="tab-icon">👤</div><span>我的</span></div>
  </div>
</div>

<script src="config.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/store/trainingStore.js"></script>
<script>
  let scenarioId = null;
  let currentDay = 1;
  let totalDays = 14;

  function updateTime() {
    const now = new Date();
    document.getElementById('currentTime').textContent =
      `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
  }
  updateTime();
  setInterval(updateTime, 1000);

  function renderStepCard(step, index, currentStep) {
    const isCompleted = index < currentStep;
    const isCurrent = index === currentStep;
    let cardClass = 'step-card';
    if (isCompleted) cardClass += ' completed';
    if (isCurrent) cardClass += ' current';
    const checkmark = isCompleted ? '✓' : (index + 1);
    return `
      <div class="${cardClass}" data-index="${index}">
        <div class="step-num">${checkmark}</div>
        <div class="step-body">
          <div class="step-action">${step.action || step.title || '步骤' + (index + 1)}</div>
          <div class="step-desc">${step.description || step.desc || ''}</div>
          ${step.duration ? `<div class="step-duration">⏱ ${step.duration}</div>` : ''}
        </div>
      </div>
    `;
  }

  function renderTrainingContent(state) {
    const { todayGoal, todayTip, steps, currentStep, day, totalDays, dayTheme, observePrompt } = state;
    document.getElementById('navTitle').textContent = dayTheme || '今日任务';
    const progress = steps.length > 0 ? ((currentStep + 1) / steps.length) * 100 : 0;
    document.getElementById('dayProgressBar').style.width = `${progress}%`;
    document.getElementById('todayGoal').textContent = todayGoal || '今日目标';
    document.getElementById('todayTip').textContent = todayTip || '在孩子心情好的时候练习';
    document.getElementById('observeText').textContent = observePrompt || '记录孩子完成情况';
    document.getElementById('stepCount').textContent = steps.length;
    const stepList = document.getElementById('stepList');
    stepList.innerHTML = steps.map((step, index) => renderStepCard(step, index, currentStep)).join('');
  }

  function renderPage(state) {
    const loadingEl = document.getElementById('loadingState');
    const errorEl = document.getElementById('errorState');
    const contentEl = document.getElementById('trainingContent');
    const bottomEl = document.getElementById('bottomArea');
    loadingEl.style.display = 'none';
    errorEl.style.display = 'none';
    contentEl.style.display = 'none';
    bottomEl.style.display = 'none';
    if (state.loading) { loadingEl.style.display = 'flex'; return; }
    if (state.error) { errorEl.style.display = 'flex'; document.getElementById('errorDesc').textContent = state.error; return; }
    contentEl.style.display = 'block';
    bottomEl.style.display = 'block';
    renderTrainingContent(state);
  }

  function retryLoad() { loadTrainingData(); }

  async function loadTrainingData() {
    const urlParams = new URLSearchParams(window.location.search);
    scenarioId = urlParams.get('scenario_id') || urlParams.get('id') || sessionStorage.getItem('lastScenarioId');
    currentDay = parseInt(urlParams.get('day')) || parseInt(sessionStorage.getItem('lastDay')) || 1;

    if (!scenarioId) { window.location.href = 'index.html'; return; }

    sessionStorage.setItem('lastScenarioId', scenarioId);
    sessionStorage.setItem('lastDay', currentDay);

    const state = await trainingStore.fetchTodayTraining(scenarioId, currentDay);
    if (state) {
      totalDays = state.totalDays || 14;
      renderPage(state);
    } else {
      trainingStore.state.loading = false;
      trainingStore.state.error = '加载训练数据失败';
      renderPage(trainingStore.state);
    }
  }

  function goBack() {
    trainingStore.saveProgress();
    window.location.href = 'index.html';
  }

  function finishTraining() {
    trainingStore.saveProgress();
    window.location.href = `feedback.html?scenario_id=${scenarioId}&day=${currentDay}`;
  }

  function switchTab(tab) {
    if (tab === 'home') { window.location.href = 'index.html'; }
    else if (tab === 'practice') { window.location.href = 'practice.html'; }
    else if (tab === 'me') { window.location.href = 'me.html'; }
  }

  trainingStore.subscribe(renderPage);
  window.addEventListener('beforeunload', function() { trainingStore.saveProgress(); });
  document.addEventListener('visibilitychange', function() { if (document.hidden) { trainingStore.saveProgress(); } });

  function init() { renderPage(trainingStore.state); loadTrainingData(); }
  init();
</script>
<!-- 鎰忚鍙嶉鎮诞鐞?-->
<script src="/static/components/feedback-widget.js"></script>
</body>
</html>
