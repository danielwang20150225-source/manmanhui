<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>记录效果 - 微干预</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F5;
      --card: #FFFFFF;
      --primary: #2D5A3D;
      --accent: #52B788;
      --accent-soft: #D8EDDF;
      --text: #1A1A1A;
      --text-secondary: #6B7280;
      --text-hint: #A1A1AA;
      --border: #E8E5E0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius: 16px;
      --radius-lg: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 20px;
      padding-bottom: 100px;
    }

    /* 顶部 */
    .header {
      display: flex;
      align-items: center;
      padding: 20px 0;
      gap: 16px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    /* 标题区 */
    .page-title {
      text-align: center;
      margin-bottom: 32px;
    }

    .page-title h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .page-title p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* 次数选择 */
    .section {
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 14px;
    }

    .times-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .time-option {
      padding: 16px 12px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .time-option:hover {
      border-color: var(--accent);
    }

    .time-option.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .time-number {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .time-label {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .time-option.active .time-number {
      color: var(--primary);
    }

    /* 效果选择 */
    .effect-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .effect-option {
      padding: 20px 12px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      transition: all 0.25s;
    }

    .effect-option:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .effect-option.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .effect-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .effect-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .effect-option.active .effect-text {
      color: var(--primary);
    }

    /* 备注 */
    .notes-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid var(--border);
    }

    .notes-input {
      width: 100%;
      min-height: 80px;
      border: none;
      background: transparent;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      line-height: 1.6;
    }

    .notes-input:focus {
      outline: none;
    }

    .notes-input::placeholder {
      color: var(--text-hint);
    }

    /* 底部按钮 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }

    .submit-btn:active {
      background: var(--primary);
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    /* 入场动画 */
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 成功弹窗 */
    .success-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      z-index: 100;
    }

    .success-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .success-content {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      margin: 20px;
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .success-modal.active .success-content {
      transform: scale(1);
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: var(--accent-soft);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 32px;
    }

    .success-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .success-text {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .success-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-hint);
    }

    .success-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部 -->
    <div class="header fade-in">
      <button class="back-btn">←</button>
      <div class="header-title">记录效果</div>
    </div>

    <!-- 页面标题 -->
    <div class="page-title fade-in delay-1">
      <h1>今天的训练怎么样？</h1>
      <p>帮我们了解训练效果，下次更好</p>
    </div>

    <!-- 次数选择 -->
    <div class="section fade-in delay-2">
      <div class="section-label">练习了多少次？</div>
      <div class="times-grid">
        <div class="time-option" data-times="1-2">
          <div class="time-number">1-2</div>
          <div class="time-label">次</div>
        </div>
        <div class="time-option active" data-times="3-5">
          <div class="time-number">3-5</div>
          <div class="time-label">次</div>
        </div>
        <div class="time-option" data-times="5+">
          <div class="time-number">5+</div>
          <div class="time-label">次</div>
        </div>
      </div>
    </div>

    <!-- 效果选择 -->
    <div class="section fade-in delay-3">
      <div class="section-label">孩子表现如何？</div>
      <div class="effect-grid">
        <div class="effect-option" data-effect="good">
          <div class="effect-icon">👍</div>
          <div class="effect-text">有进步</div>
        </div>
        <div class="effect-option active" data-effect="normal">
          <div class="effect-icon">🤔</div>
          <div class="effect-text">和平时一样</div>
        </div>
        <div class="effect-option" data-effect="hard">
          <div class="effect-icon">😓</div>
          <div class="effect-text">有点难</div>
        </div>
      </div>
    </div>

    <!-- 备注 -->
    <div class="section fade-in delay-3">
      <div class="section-label">有什么想说的？（选填）</div>
      <div class="notes-card">
        <textarea class="notes-input" placeholder="记录下今天的特殊情况..."></textarea>
      </div>
    </div>
  </div>

  <!-- 底部按钮 -->
  <div class="bottom-bar">
    <button class="submit-btn" id="submitBtn">提交记录</button>
  </div>

  <!-- 成功弹窗 -->
  <div class="success-modal" id="successModal">
    <div class="success-content">
      <div class="success-icon">✓</div>
      <div class="success-title">做得很棒！</div>
      <div class="success-text">每一次练习都是进步</div>
      <div class="success-stats">
        <div class="stat-item">
          <div class="stat-value">5</div>
          <div class="stat-label">今日练习</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">2/7</div>
          <div class="stat-label">训练进度</div>
        </div>
      </div>
      <button class="success-btn" onclick="window.location.href='index-v4.html'">返回首页</button>
    </div>
  </div>

  <script>
    const timeOptions = document.querySelectorAll('.time-option');
    const effectOptions = document.querySelectorAll('.effect-option');
    const submitBtn = document.getElementById('submitBtn');
    const successModal = document.getElementById('successModal');

    let selectedTimes = '3-5';
    let selectedEffect = 'normal';

    // 次数选择
    timeOptions.forEach(option => {
      option.addEventListener('click', () => {
        timeOptions.forEach(o => o.classList.remove('active'));
        option.classList.add('active');
        selectedTimes = option.dataset.times;
      });
    });

    // 效果选择
    effectOptions.forEach(option => {
      option.addEventListener('click', () => {
        effectOptions.forEach(o => o.classList.remove('active'));
        option.classList.add('active');
        selectedEffect = option.dataset.effect;
      });
    });

    // 提交
    submitBtn.addEventListener('click', () => {
      // 显示成功弹窗
      successModal.classList.add('active');
    });

    // 返回按钮
    document.querySelector('.back-btn').addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
