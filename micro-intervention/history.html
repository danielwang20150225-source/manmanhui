<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>训练记录 - 微干预</title>
  <link rel="stylesheet" href="/static/styles/design-system.css">
  <style>
    /* Professional Design System Override */
    :root {
      --accent: #34C759;
      --accent-dark: #2DBE48;
      --accent-light: #E8F8ED;
      --bg: #F8F9FA;
      --card: #FFFFFF;
      --text-primary: #1D1D1F;
      --text-secondary: #6E6E73;
      --text-hint: #AEAEB2;
      --border: #E5E5E7;
      --blue: #007AFF;
      --blue-light: #E5F2FF;
      --orange: #FF9500;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.06), 0 12px 40px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-lg: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background: #F7F4F0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }
    .phone-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #F7F4F0;
      position: relative;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid #E8E4E0;
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 600;
    }
    .status-bar .icons { display: flex; gap: 6px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 50%; transition: all 0.2s;
      font-size: 18px; color: var(--text-primary);
      background: var(--bg);
    }
    .back-btn:active { background: var(--border); }
    .header-title {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 600; color: var(--text-primary);
      margin-right: 36px;
    }

    /* Page Content */
    .page-content { padding: 0 0 24px; }

    /* Loading State */
    .loading-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .loading-spinner { font-size: 32px; animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Scenario Bar */
    .scenario-bar {
      background: var(--card);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .scenario-bar .emoji {
      width: 44px;
      height: 44px;
      background: var(--accent-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .scenario-bar .name { font-size: 17px; font-weight: 600; color: var(--text-primary); flex: 1; }
    .scenario-bar .meta { font-size: 13px; color: var(--text-secondary); }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 0 16px 16px;
    }
    .stat-item {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 8px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-item .num { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px; }
    .stat-item .num.green { color: var(--accent); }
    .stat-item .num.orange { color: var(--orange); }
    .stat-item .num.red { color: #FF3B30; }
    .stat-item .label { font-size: 11px; color: var(--text-secondary); }

    /* Month Group */
    .month-label {
      padding: 14px 20px 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .record-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
    .record-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }
    .record-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .record-day { display: flex; align-items: center; gap: 8px; }
    .record-day .day-num { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .record-day .date { font-size: 12px; color: var(--text-secondary); }
    .record-effect { display: flex; align-items: center; gap: 4px; }
    .effect-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .effect-badge.good { background: var(--accent-light); color: var(--accent); }
    .effect-badge.neutral { background: #FFF8E1; color: var(--orange); }
    .effect-badge.bad { background: #FFEBEE; color: #FF3B30; }
    .record-body { font-size: 13px; color: var(--text-secondary); line-height: 1.5; padding-left: 2px; }
    .record-footer { display: flex; align-items: center; gap: 12px; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .record-tag { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
    .record-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
    .record-tag.count .dot { background: var(--accent); }
    .record-tag.note .dot { background: var(--orange); }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state .text { font-size: 15px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="phone-wrapper">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons"><span>📶</span><span>🔋</span></div>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="back-btn" onclick="window.location.href='index.html'">←</div>
      <div class="header-title">训练记录</div>
    </div>

    <!-- Page Content -->
    <div class="page-content" id="pageContent"></div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState">
      <div class="loading-spinner">🔄</div>
      <div style="margin-top:12px;">加载中...</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>

  <script>
    function getScenarioId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    function getEmojiFromTitle(title) {
      const emojiMap = { '穿衣': '👕', '社交': '👀', '情绪': '😢', '叫名字': '👂', '眼神': '🙈', '刻板': '🔄', '抗拒': '👕', '哭闹': '😢', '躲避': '🙈', '不安': '😣' };
      for (const [key, emoji] of Object.entries(emojiMap)) {
        if (title.includes(key)) return emoji;
      }
      return '👕';
    }

    function getEffectBadge(emoji) {
      const map = { '😊': { rating: 'good', emoji: '😊', label: '顺利', class: 'good' }, '😐': { rating: 'neutral', emoji: '😐', label: '一般', class: 'neutral' }, '😣': { rating: 'bad', emoji: '😣', label: '有点难', class: 'bad' } };
      return map[emoji] || map['😐'];
    }

    function formatRecordDate(dateStr) {
      if (!dateStr) return '未知时间';
      const date = new Date(dateStr);
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      const targetDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      const timeStr = `${hours}:${minutes}`;
      if (targetDate.getTime() === today.getTime()) { return `今天 ${timeStr}`; }
      else if (targetDate.getTime() === yesterday.getTime()) { return `昨天 ${timeStr}`; }
      else { const month = (date.getMonth() + 1).toString().padStart(2, '0'); const day = date.getDate().toString().padStart(2, '0'); return `${month}-${day} ${timeStr}`; }
    }

    function groupByMonth(records) {
      const groups = {};
      records.forEach(record => {
        const date = new Date(record.created_at || record.date || record.completed_at);
        const key = `${date.getFullYear()}年${date.getMonth() + 1}月`;
        if (!groups[key]) { groups[key] = []; }
        groups[key].push(record);
      });
      return groups;
    }

    async function loadHistory() {
      const scenarioId = getScenarioId();
      if (!scenarioId) { showError('缺少情境ID'); return; }

      try {
        const response = await fetch(`${getApiBase()}/api/scenarios/${scenarioId}`);
        if (!response.ok) { throw new Error(`请求失败: ${response.status}`); }

        const result = await response.json();
        const data = result.data?.scenario || result.data;

        const historyResponse = await fetch(`${getApiBase()}/api/scenarios/${scenarioId}/history`);
        if (!historyResponse.ok) { throw new Error(`请求失败: ${historyResponse.status}`); }

        const historyResult = await historyResponse.json();
        const records = (historyResult.data && historyResult.data.history) || [];
        renderHistory(data, records);

      } catch (error) {
        console.error('加载历史记录失败:', error);
        showError('加载失败，请重试');
      }
    }

    function renderHistory(scenarioData, records) {
      const pageContent = document.getElementById('pageContent');

      const stats = { good: 0, neutral: 0, bad: 0 };
      records.forEach(record => {
        const e = record.emoji;
        if (e === '😊') stats.good++;
        else if (e === '😐') stats.neutral++;
        else if (e === '😣') stats.bad++;
      });

      const monthGroups = groupByMonth(records);

      let historyContent = '';
      if (records.length === 0) {
        historyContent = `<div class="empty-state"><div class="icon">📝</div><div class="text">还没有训练记录</div></div>`;
      } else {
        historyContent = Object.entries(monthGroups).map(([month, monthRecords]) => `
          <div class="month-group">
            <div class="month-label">${month}</div>
            <div class="record-list">
              ${monthRecords.map(record => {
                const effect = getEffectBadge(record.emoji);
                const dateStr = formatRecordDate(record.created_at || record.date || '');
                const detail = record.text || record.analysis || '';
                const trainCount = record.train_count || '1~2次';

                return `
                  <div class="record-card">
                    <div class="record-header">
                      <div class="record-day"><span class="day-num">第${record.day}天</span><span class="date">${dateStr}</span></div>
                      <div class="record-effect"><div class="effect-badge ${effect.class}"><span>${effect.emoji}</span><span>${effect.label}</span></div></div>
                    </div>
                    ${detail ? `<div class="record-body">${detail}</div>` : ''}
                    <div class="record-footer">
                      <div class="record-tag count"><span class="dot"></span>练了${trainCount}</div>
                      ${record.text ? '<div class="record-tag note"><span class="dot"></span>有家长备注</div>' : ''}
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `).join('');
      }

      const rawTitle = scenarioData.scenario_title || scenarioData.package_name || '未命名情境';
      const scenarioTitle = rawTitle.replace(/^任务包_\d+_/, '');
      const scenarioEmoji = scenarioData.scenario_emoji || getEmojiFromTitle(scenarioTitle);

      pageContent.innerHTML = `
        <div class="scenario-bar">
          <div class="emoji">${scenarioEmoji}</div>
          <span class="name">${scenarioTitle}</span>
          <span class="meta">共${records.length}次训练</span>
        </div>

        <div class="stats-row">
          <div class="stat-item"><div class="num green">${stats.good}</div><div class="label">顺利</div></div>
          <div class="stat-item"><div class="num orange">${stats.neutral}</div><div class="label">一般</div></div>
          <div class="stat-item"><div class="num red">${stats.bad}</div><div class="label">有点难</div></div>
        </div>

        ${historyContent}
      `;

      document.getElementById('loadingState').style.display = 'none';
    }

    function showError(message) {
      const pageContent = document.getElementById('pageContent');
      pageContent.innerHTML = `
        <div style="text-align:center;padding:60px 20px;">
          <div style="font-size:56px;margin-bottom:16px;">😢</div>
          <div style="color:var(--text-secondary);font-size:15px;">${message}</div>
          <div style="margin-top:20px;">
            <button onclick="loadHistory()" style="background:var(--accent);color:#fff;border:none;padding:14px 28px;border-radius:14px;cursor:pointer;font-size:14px;font-weight:600;">重试</button>
          </div>
        </div>
      `;
      document.getElementById('loadingState').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => { loadHistory(); });
  </script>
<!-- 鎰忚鍙嶉鎮诞鐞?-->
<script src="/static/components/feedback-widget.js"></script>
</body>
</html>
