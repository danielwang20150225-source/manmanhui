<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>训练进行中 - 微干预</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F5;
      --card: #FFFFFF;
      --primary: #2D5A3D;
      --accent: #52B788;
      --accent-soft: #D8EDDF;
      --text: #1A1A1A;
      --text-secondary: #6B7280;
      --text-hint: #A1A1AA;
      --border: #E8E5E0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius: 16px;
      --radius-lg: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 20px;
      padding-bottom: 100px;
    }

    /* 顶部返回 */
    .header {
      display: flex;
      align-items: center;
      padding: 20px 0;
      gap: 16px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
    }

    .back-btn:active {
      transform: scale(0.95);
    }

    .header-title {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .header-title strong {
      color: var(--text);
      font-weight: 600;
    }

    /* 情境卡片 */
    .scenario-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .scenario-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .scenario-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-soft);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .scenario-info h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .scenario-info p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .scenario-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      background: var(--accent-soft);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
    }

    /* 进度条 */
    .progress-section {
      margin-bottom: 24px;
    }

    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .progress-day {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .progress-count {
      font-size: 13px;
      color: var(--text-hint);
    }

    .progress-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      border-radius: 4px;
      transition: width 0.5s ease-out;
    }

    /* 今日目标 */
    .goal-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .goal-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .goal-icon {
      font-size: 18px;
    }

    .goal-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .goal-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
    }

    /* 任务步骤 */
    .steps-section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 16px;
    }

    .step-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .step-number {
      width: 28px;
      height: 28px;
      background: var(--primary);
      color: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-content {
      flex: 1;
    }

    .step-text {
      font-size: 15px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .step-hint {
      font-size: 13px;
      color: var(--text-hint);
    }

    /* 观察要点 */
    .observe-card {
      background: linear-gradient(135deg, #FFF9E6 0%, #FFF3CC 100%);
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid #FFE69C;
      margin-bottom: 24px;
    }

    .observe-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .observe-icon {
      font-size: 16px;
    }

    .observe-title {
      font-size: 13px;
      font-weight: 600;
      color: #8B6914;
    }

    .observe-text {
      font-size: 14px;
      color: #6B5200;
      line-height: 1.5;
    }

    /* 底部按钮 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
    }

    .feedback-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      font-family: inherit;
    }

    .feedback-btn:active {
      background: var(--primary);
      transform: scale(0.98);
    }

    /* 入场动画 */
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
      opacity: 0;
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部 -->
    <div class="header fade-in">
      <button class="back-btn">←</button>
      <div class="header-title">进行中 · <strong>叫他名字没反应</strong></div>
    </div>

    <!-- 情境卡片 -->
    <div class="scenario-card fade-in delay-1">
      <div class="scenario-header">
        <div class="scenario-icon">👂</div>
        <div class="scenario-info">
          <h2>叫他名字没反应</h2>
          <p>目标：听到名字能回头看你</p>
        </div>
      </div>
      <span class="scenario-tag">Day 2</span>
    </div>

    <!-- 进度 -->
    <div class="progress-section fade-in delay-2">
      <div class="progress-header">
        <span class="progress-day">训练进度</span>
        <span class="progress-count">2/7天</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width: 28%"></div>
      </div>
    </div>

    <!-- 今日目标 -->
    <div class="goal-card fade-in delay-3">
      <div class="goal-header">
        <span class="goal-icon">🎯</span>
        <span class="goal-title">今日目标</span>
      </div>
      <div class="goal-text">让孩子听到名字后，能看你一眼</div>
    </div>

    <!-- 任务步骤 -->
    <div class="steps-section fade-in delay-4">
      <div class="section-title">今天这样做</div>

      <div class="step-card">
        <div class="step-number">1</div>
        <div class="step-content">
          <div class="step-text">靠近一点（1米内），轻声叫他名字</div>
          <div class="step-hint">注意：不要同时有其他干扰</div>
        </div>
      </div>

      <div class="step-card">
        <div class="step-number">2</div>
        <div class="step-content">
          <div class="step-text">等待 3 秒，观察他的反应</div>
          <div class="step-hint">给他反应的时间</div>
        </div>
      </div>

      <div class="step-card">
        <div class="step-number">3</div>
        <div class="step-content">
          <div class="step-text">他看你时，马上表扬："看我了！真棒！"</div>
          <div class="step-hint">及时强化正确行为</div>
        </div>
      </div>
    </div>

    <!-- 观察要点 -->
    <div class="observe-card fade-in delay-4">
      <div class="observe-header">
        <span class="observe-icon">👁️</span>
        <span class="observe-title">观察重点</span>
      </div>
      <div class="observe-text">他有没有注意到你在叫他名字？有没有转头的倾向？哪怕只是眼神有一点变化，也要及时表扬。</div>
    </div>
  </div>

  <!-- 底部按钮 -->
  <div class="bottom-bar">
    <button class="feedback-btn" onclick="window.location.href='feedback.html'">完成训练，记录效果</button>
  </div>

  <script>
    document.querySelector('.back-btn').addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
