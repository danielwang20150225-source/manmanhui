<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>微干预</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF8F5;
      --card: #FFFFFF;
      --primary: #2D5A3D;
      --accent: #52B788;
      --accent-soft: #D8EDDF;
      --text: #1A1A1A;
      --text-secondary: #6B7280;
      --text-hint: #A1A1AA;
      --border: #E8E5E0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
      --radius: 16px;
      --radius-lg: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 0 20px;
      padding-bottom: 40px;
    }

    /* 顶部区域 */
    .hero {
      padding-top: 56px;
      padding-bottom: 40px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .brand-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    .hero-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .hero-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 280px;
      margin: 0 auto;
    }

    /* 输入卡片 */
    .input-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .input-field {
      width: 100%;
      min-height: 80px;
      padding: 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--bg);
      line-height: 1.6;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .input-field::placeholder {
      color: var(--text-hint);
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }

    .char-count {
      font-size: 12px;
      color: var(--text-hint);
    }

    .submit-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }

    .submit-btn:hover {
      background: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(82, 183, 136, 0.3);
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    /* 任务区域 */
    .section {
      margin-top: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .section-count {
      font-size: 12px;
      color: var(--text-hint);
    }

    /* 任务卡片 */
    .task-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .task-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-md);
    }

    .task-card:hover::before {
      opacity: 1;
    }

    .task-card:active {
      transform: scale(0.99);
    }

    .task-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .task-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-soft);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .task-content {
      flex: 1;
    }

    .task-scenario {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .task-goal {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .task-status {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      background: var(--accent-soft);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: var(--primary);
    }

    .task-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--bg);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      border-radius: 2px;
      transition: width 0.4s ease-out;
    }

    .progress-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-text {
      font-size: 14px;
      color: var(--text-hint);
    }

    /* 加载状态 */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(250, 248, 245, 0.95);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-pulse {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
    }

    .loading-hint {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-hint);
    }

    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 12px 24px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-hint);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-icon {
      font-size: 22px;
    }

    /* 入场动画 */
    .fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }

    .fade-in-delay-1 {
      animation-delay: 0.1s;
      opacity: 0;
    }

    .fade-in-delay-2 {
      animation-delay: 0.2s;
      opacity: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部区域 -->
    <section class="hero fade-in">
      <div class="brand">
        <span class="brand-dot"></span>
        微干预
      </div>
      <h1 class="hero-title">把头疼的情境<br>变成练习机会</h1>
      <p class="hero-subtitle">描述孩子的行为，我来帮你制定每天5分钟的干预训练</p>
    </section>

    <!-- 输入区 -->
    <section class="input-card fade-in fade-in-delay-1">
      <div class="input-label">描述一个让你头疼的情境</div>
      <textarea class="input-field" id="scenarioInput" placeholder="比如：叫他名字完全没反应..." maxlength="80"></textarea>
      <div class="input-footer">
        <span class="char-count"><span id="charCount">0</span>/80</span>
        <button class="submit-btn" id="submitBtn" disabled>生成训练</button>
      </div>
    </section>

    <!-- 进行中的任务 -->
    <section class="section fade-in fade-in-delay-2">
      <div class="section-header">
        <span class="section-title">进行中的任务</span>
        <span class="section-count">1/3</span>
      </div>

      <div class="task-card" id="taskCard">
        <div class="task-header">
          <div class="task-icon">👂</div>
          <div class="task-content">
            <div class="task-scenario">叫他名字没反应</div>
            <div class="task-goal">目标：听到名字能回头看你</div>
          </div>
          <span class="task-status">Day 2</span>
        </div>
        <div class="task-progress">
          <div class="progress-track">
            <div class="progress-fill" style="width: 28%"></div>
          </div>
          <span class="progress-label">2/7天</span>
        </div>
      </div>
    </section>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <a href="#" class="nav-item active">
        <span class="nav-icon">📋</span>
        <span>今日</span>
      </a>
      <a href="history-v2.html" class="nav-item">
        <span class="nav-icon">📚</span>
        <span>任务</span>
      </a>
      <a href="#" class="nav-item">
        <span class="nav-icon">👤</span>
        <span>我的</span>
      </a>
    </nav>

  <!-- 加载状态 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-pulse"></div>
    <div class="loading-text">正在生成训练方案</div>
    <div class="loading-hint">大约需要 10-15 秒</div>
  </div>

  <script>
    const input = document.getElementById('scenarioInput');
    const charCount = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const taskCard = document.getElementById('taskCard');

    // 实时字符计数
    input.addEventListener('input', () => {
      const len = input.value.length;
      charCount.textContent = len;
      submitBtn.disabled = len === 0;
      submitBtn.style.opacity = len > 0 ? '1' : '0.6';
    });

    // 提交
    submitBtn.addEventListener('click', () => {
      const scenario = input.value.trim();
      if (!scenario) return;

      loadingOverlay.classList.add('active');

      // 模拟生成
      setTimeout(() => {
        window.location.href = 'training.html';
      }, 1500);
    });

    // 任务卡片点击
    taskCard.addEventListener('click', () => {
      window.location.href = 'training.html';
    });
  </script>
</body>
</html>
