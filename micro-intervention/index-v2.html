<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>微干预 - ASD儿童家庭干预</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FAF9F7;
      --card: #FFFFFF;
      --primary: #2D5A3D;
      --primary-light: #E8F0EA;
      --accent: #48BB31;
      --accent-hover: #3DA829;
      --text: #1A1A1A;
      --text-secondary: #6B6B6B;
      --text-hint: #999999;
      --border: #E5E2DD;
      --radius: 20px;
      --shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
      padding-bottom: 90px;
    }

    /* 顶部区域 */
    .header {
      padding: 24px 24px 0;
      text-align: center;
    }

    .header-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 280px;
      margin: 0 auto;
    }

    /* 主输入区 */
    .input-section {
      padding: 32px 24px;
    }

    .input-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .input-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-label::before {
      content: '';
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
    }

    .input-field {
      width: 100%;
      min-height: 120px;
      padding: 16px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      transition: border-color 0.2s;
      background: var(--bg);
    }

    .input-field:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input-field::placeholder {
      color: var(--text-hint);
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: var(--text-hint);
      margin-top: 8px;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      margin-top: 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .submit-btn:active {
      background: var(--accent-hover);
      transform: scale(0.98);
    }

    .submit-btn:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    /* 示例区 */
    .examples {
      padding: 0 24px;
    }

    .examples-title {
      font-size: 13px;
      color: var(--text-hint);
      margin-bottom: 12px;
    }

    .examples-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .example-item {
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-item:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .example-item::before {
      content: '💡 ';
    }

    /* 任务列表 */
    .tasks-section {
      padding: 32px 24px 0;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .task-count {
      font-size: 13px;
      color: var(--text-hint);
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .task-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .task-card:active {
      transform: scale(0.98);
    }

    .task-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .task-icon {
      width: 44px;
      height: 44px;
      background: var(--primary-light);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .task-info {
      flex: 1;
      min-width: 0;
    }

    .task-scenario {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-goal {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .task-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--primary-light);
      border-radius: 20px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
    }

    .task-progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 13px;
      color: var(--text-hint);
      white-space: nowrap;
    }

    .task-action {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .empty-text {
      font-size: 15px;
      color: var(--text-hint);
    }

    /* 底部导航 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 12px 24px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-hint);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-item.active {
      color: var(--primary);
    }

    .nav-item-icon {
      font-size: 22px;
    }

    .nav-item.active .nav-item-icon {
      transform: scale(1.1);
    }

    /* 加载状态 */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(250, 249, 247, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .loading-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .loading-hint {
      font-size: 14px;
      color: var(--text-hint);
    }

    /* 动画 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .input-section,
    .examples,
    .tasks-section {
      animation: fadeInUp 0.5s ease-out;
    }

    .examples {
      animation-delay: 0.1s;
      animation-fill-mode: both;
    }

    .tasks-section {
      animation-delay: 0.2s;
      animation-fill-mode: both;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 顶部区域 -->
    <div class="header">
      <div class="header-icon">🌱</div>
      <h1>微干预</h1>
      <p>把每一次头疼的情境，变成一次有效的干预练习</p>
    </div>

    <!-- 主输入区 -->
    <div class="input-section">
      <div class="input-card">
        <div class="input-label">描述一个让你头疼的情境</div>
        <textarea class="input-field" id="scenarioInput" placeholder="比如：叫他名字完全没反应..." maxlength="200"></textarea>
        <div class="char-count"><span id="charCount">0</span>/200</div>
        <button class="submit-btn" id="submitBtn" disabled>生成干预任务</button>
      </div>
    </div>

    <!-- 示例区 -->
    <div class="examples">
      <div class="examples-title">试试这些常见情境</div>
      <div class="examples-list">
        <div class="example-item">叫他名字完全没反应</div>
        <div class="example-item">不愿跟其他小朋友玩</div>
        <div class="example-item">不肯换新衣服</div>
      </div>
    </div>

    <!-- 进行中的任务 -->
    <div class="tasks-section">
      <div class="section-header">
        <span class="section-title">进行中的任务</span>
        <span class="task-count">1/3</span>
      </div>

      <div class="task-list">
        <div class="task-card">
          <div class="task-header">
            <div class="task-icon">👂</div>
            <div class="task-info">
              <div class="task-scenario">叫他名字没反应</div>
              <div class="task-goal">目标：听到名字能回头</div>
            </div>
            <div class="task-status">
              <span>进行中</span>
            </div>
          </div>
          <div class="task-progress">
            <div class="progress-bar">
              <div class="progress-fill" style="width: 42%"></div>
            </div>
            <span class="progress-text">Day 3/7</span>
          </div>
          <div class="task-action">继续今天的训练 →</div>
        </div>
      </div>
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
      <a href="#" class="nav-item active">
        <span class="nav-item-icon">📋</span>
        <span>今日任务</span>
      </a>
      <a href="#" class="nav-item">
        <span class="nav-item-icon">🎯</span>
        <span>孩子练习</span>
      </a>
      <a href="#" class="nav-item">
        <span class="nav-item-icon">👤</span>
        <span>我的</span>
      </a>
    </nav>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在分析你的情境...</div>
      <div class="loading-hint">大约需要 10-15 秒</div>
    </div>
  </div>

  <script>
    const input = document.getElementById('scenarioInput');
    const charCount = document.getElementById('charCount');
    const submitBtn = document.getElementById('submitBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const exampleItems = document.querySelectorAll('.example-item');

    // 字符计数
    input.addEventListener('input', () => {
      const count = input.value.length;
      charCount.textContent = count;
      submitBtn.disabled = count === 0;
    });

    // 示例点击
    exampleItems.forEach(item => {
      item.addEventListener('click', () => {
        input.value = item.textContent;
        charCount.textContent = input.value.length;
        submitBtn.disabled = false;
        input.focus();
      });
    });

    // 提交
    submitBtn.addEventListener('click', () => {
      const scenario = input.value.trim();
      if (!scenario) return;

      loadingOverlay.classList.add('active');

      // 模拟 API 调用
      setTimeout(() => {
        loadingOverlay.classList.remove('active');
        // 跳转到任务详情页
        window.location.href = 'training.html';
      }, 2000);
    });

    // 任务卡片点击
    document.querySelector('.task-card')?.addEventListener('click', () => {
      window.location.href = 'training.html';
    });
  </script>
</body>
</html>
