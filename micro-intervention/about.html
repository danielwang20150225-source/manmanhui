<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>关于微干预 - 微干预</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F7F4F0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }
    .phone-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #F7F4F0;
      position: relative;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid #E8E4E0;
    }
    .status-bar {
      height: 44px;
      background: #2D2D2D;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 600;
    }
    .status-bar .icons { display: flex; gap: 6px; }
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #FFFFFF;
      border-bottom: 1px solid #E8E4E0;
    }
    .back-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 50%; transition: background 0.2s;
      font-size: 18px; color: #2D2D2D;
    }
    .back-btn:active { background: #F0F0F0; }
    .header-title {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 600; color: #2D2D2D;
      margin-right: 32px;
    }
    .page-content { padding: 24px 20px; }
    .app-icon-row {
      text-align: center;
      margin-bottom: 20px;
    }
    .app-icon {
      width: 72px; height: 72px;
      background: #E8F5E9;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin: 0 auto 12px;
    }
    .app-name {
      font-size: 20px; font-weight: bold;
      color: #2D2D2D; margin-bottom: 4px;
    }
    .app-version { font-size: 13px; color: #ADADAD; }
    .desc-card {
      background: #FFFFFF;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      margin-bottom: 12px;
    }
    .desc-title {
      font-size: 13px; font-weight: 600;
      color: #2D2D2D; margin-bottom: 10px;
    }
    .desc-text {
      font-size: 14px; color: #6B6B6B;
      line-height: 1.8;
    }
    .tagline-block {
      background: #E8F5E9;
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
      font-size: 15px; font-weight: 600;
      color: #7CB342;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="phone-wrapper">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons"><span>📶</span><span>🔋</span></div>
    </div>
    <div class="header">
      <div class="back-btn" onclick="window.location.href='me.html'">←</div>
      <div class="header-title">关于微干预</div>
    </div>
    <div class="page-content">
      <div class="app-icon-row">
        <div class="app-icon">🌱</div>
        <div class="app-name">微干预</div>
        <div class="app-version">v0.1 · 2026</div>
      </div>
      <div class="tagline-block">
        让每一个情境问题<br>都能转化成为一次有效干预
      </div>
      <div class="desc-card" style="margin-top:16px;">
        <div class="desc-title">我们是谁</div>
        <div class="desc-text">
          微干预是一款专注于家庭干预的AI助手，由一位ASD家长为ASD家庭打造。我们相信：每一次真实情境中的练习，都比任何评估量表更有价值。
        </div>
      </div>
      <div class="desc-card">
        <div class="desc-title">我们的原则</div>
        <div class="desc-text">
          不做空洞的正向鼓励，不给家长制造焦虑。每一次训练，都以"孩子真正进步"为唯一标准。
        </div>
      </div>
    </div>
  </div>
</body>
</html>
