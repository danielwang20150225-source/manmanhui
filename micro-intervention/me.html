<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>我的 - 微干预</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #F7F4F0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }
    .phone-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #F7F4F0;
      position: relative;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid #E8E4E0;
    }
    /* 状态栏 */
    .status-bar {
      height: 44px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 600;
    }
    .status-bar .icons { display: flex; gap: 6px; }
    /* 页面主体 */
    .page-content {
      padding: 20px 0 80px;
    }
    /* 孩子档案卡片 */
    .profile-card {
      background: #FFFFFF;
      margin: 0 16px 12px;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .profile-card:active { transform: scale(0.99); }
    .profile-avatar {
      width: 56px; height: 56px;
      background: #E8F5E9;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-name {
      font-size: 18px; font-weight: bold;
      color: #2D2D2D; margin-bottom: 4px;
    }
    .profile-desc {
      font-size: 13px; color: #6B6B6B;
    }
    .profile-arrow { font-size: 18px; color: #C8C8C8; }
    /* 设置列表 */
    .section-title {
      padding: 16px 20px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #ADADAD;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setting-list {
      background: #FFFFFF;
      margin: 0 16px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .setting-item {
      display: flex;
      align-items: center;
      padding: 15px 16px;
      border-bottom: 1px solid #F5F5F5;
      cursor: pointer;
      transition: background 0.15s;
    }
    .setting-item:last-child { border-bottom: none; }
    .setting-item:active { background: #FAFAFA; }
    .setting-icon { font-size: 20px; margin-right: 12px; width: 24px; text-align: center; }
    .setting-label { flex: 1; font-size: 15px; color: #2D2D2D; }
    .setting-arrow { font-size: 16px; color: #C8C8C8; }
    /* 底部提示 */
    .app-footer {
      text-align: center;
      padding: 24px 20px 0;
    }
    .app-name {
      font-size: 14px; font-weight: 600;
      color: #2D2D2D; margin-bottom: 4px;
    }
    .app-version { font-size: 12px; color: #C8C8C8; }
    /* Tab栏 */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: 64px;
      background: #FFFFFF;
      border-top: 1px solid #E8E4E0;
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      color: #6B6B6B; font-size: 11px;
      cursor: pointer; transition: all 0.2s;
    }
    .tab-item.active { color: #7CB342; font-weight: bold; }
    .tab-icon { font-size: 20px; }
    /* 已完成区域 */
    .completed-section {
      padding: 0 16px 16px;
    }
    .completed-title {
      font-size: 12px;
      font-weight: 600;
      color: #ADADAD;
      margin-bottom: 10px;
    }
    .completed-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .completed-scroll::-webkit-scrollbar { display: none; }
    .completed-card {
      flex-shrink: 0;
      width: 140px;
      background: #FFFFFF;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .completed-card:active { transform: scale(0.97); }
    .completed-emoji {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .completed-name {
      font-size: 13px;
      font-weight: 600;
      color: #2D2D2D;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .completed-meta {
      font-size: 11px;
      color: #6B6B6B;
    }
    .completed-empty {
      font-size: 13px;
      color: #ADADAD;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="phone-wrapper">
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="icons"><span>📶</span><span>🔋</span></div>
    </div>

    <!-- 页面主体 -->
    <div class="page-content">

      <!-- 已完成区域 -->
      <div class="completed-section">
        <div class="completed-title">已完成的任务</div>
        <div class="completed-scroll" id="completedList">
          <div class="completed-empty">暂无已完成的任务</div>
        </div>
      </div>

      <!-- 孩子档案卡片 -->
      <div class="profile-card" onclick="window.location.href='child-profile.html'">
        <div class="profile-avatar">👶</div>
        <div class="profile-info">
          <div class="profile-name" id="childName">小星</div>
          <div class="profile-desc" id="childAge">11岁 · 男孩</div>
        </div>
        <div class="profile-arrow">›</div>
      </div>

      <!-- 设置 -->
      <div class="section-title">设置</div>
      <div class="setting-list">
        <div class="setting-item" onclick="window.location.href='about.html'">
          <span class="setting-icon">ℹ️</span>
          <span class="setting-label">关于微干预</span>
          <span class="setting-arrow">›</span>
        </div>
      </div>

      <!-- 底部 -->
      <div class="app-footer">
        <div class="app-name">微干预</div>
        <div class="app-version">v0.1 · 2026</div>
      </div>
    </div>

    <!-- Tab栏 -->
    <div class="tab-bar">
      <div class="tab-item" onclick="window.location.href='index.html'">
        <span class="tab-icon">👨‍👩‍👦</span>
        <span>家长干预</span>
      </div>
      <div class="tab-item" onclick="window.location.href='practice.html'">
        <span class="tab-icon">🧒</span>
        <span>孩子练习</span>
      </div>
      <div class="tab-item active">
        <span class="tab-icon">👤</span>
        <span>我的</span>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script>
    // 从localStorage加载孩子信息
    function loadChildInfo() {
      const childName = localStorage.getItem('child_name') || '小星';
      const childAge = localStorage.getItem('child_age') || '11';
      const childGender = localStorage.getItem('child_gender') || 'boy';

      const genderText = childGender === 'boy' ? '男孩' : '女孩';

      document.getElementById('childName').textContent = childName;
      document.getElementById('childAge').textContent = `${childAge}岁 · ${genderText}`;
    }

    // 加载已完成的任务
    async function loadCompletedTasks() {
      try {
        const response = await fetch(`${getApiBase()}/api/scenarios?status=completed&limit=20`);
        if (!response.ok) throw new Error('请求失败');

        const result = await response.json();
        const scenarios = result.data?.scenarios || [];

        const completedList = document.getElementById('completedList');

        if (scenarios.length === 0) {
          completedList.innerHTML = '<div class="completed-empty">暂无已完成的任务</div>';
          return;
        }

        completedList.innerHTML = scenarios.map(sc => {
          const rawTitle = sc.scenario_title || sc.package_name || '未命名';
          const title = rawTitle.replace(/^任务包_\d+_/, '');
          const emoji = sc.scenario_emoji || getEmojiFromTitle(title);
          const totalDays = sc.total_days || sc.current_day || 14;
          const trainCount = sc.total_train_count || 0;

          return `
            <div class="completed-card" onclick="window.location.href='history.html?id=${sc.scenario_id}'">
              <div class="completed-emoji">${emoji}</div>
              <div class="completed-name">${title}</div>
              <div class="completed-meta">${totalDays}天 · ${trainCount}次训练</div>
            </div>
          `;
        }).join('');

      } catch (error) {
        console.error('加载已完成任务失败:', error);
      }
    }

    // 从标题提取emoji
    function getEmojiFromTitle(title) {
      const emojiMap = {
        '穿衣': '👕', '社交': '👀', '情绪': '😢', '叫名字': '👂',
        '眼神': '🙈', '刻板': '🔄', '抗拒': '👕', '哭闹': '😢',
        '躲避': '🙈', '不安': '😣'
      };
      for (const [key, emoji] of Object.entries(emojiMap)) {
        if (title.includes(key)) return emoji;
      }
      return '📋';
    }

    // 页面加载时获取孩子信息
    document.addEventListener('DOMContentLoaded', () => {
      loadChildInfo();
      loadCompletedTasks();
    });
  </script>
</body>
</html>
