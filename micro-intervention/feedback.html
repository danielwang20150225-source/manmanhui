<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>记录今日训练 - 微干预</title>
  <link rel="stylesheet" href="/static/styles/design-system.css">
  <style>
    /* Professional Design System Override */
    :root {
      --accent: #34C759;
      --accent-dark: #2DBE48;
      --accent-light: #E8F8ED;
      --bg: #F8F9FA;
      --card: #FFFFFF;
      --text-primary: #1D1D1F;
      --text-secondary: #6E6E73;
      --text-hint: #AEAEB2;
      --border: #E5E5E7;
      --blue: #007AFF;
      --blue-light: #E5F2FF;
      --orange: #FF9500;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.06), 0 12px 40px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-lg: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      background: #F7F4F0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 0;
    }
    .phone-wrapper {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: #F7F4F0;
      position: relative;
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid #E8E4E0;
    }

    /* Status Bar */
    .status-bar {
      height: 44px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 600;
    }
    .status-bar .icons { display: flex; gap: 6px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 50%; transition: all 0.2s;
      font-size: 18px; color: var(--text-primary);
      background: var(--bg);
    }
    .back-btn:active { background: var(--border); }
    .header-title {
      flex: 1; text-align: center;
      font-size: 17px; font-weight: 600; color: var(--text-primary);
      margin-right: 36px;
    }

    /* Page Content */
    .page-content { padding: 24px 20px 140px; }

    /* Done Header */
    .done-header {
      text-align: center;
      padding: 32px 0 28px;
    }
    .done-icon {
      width: 72px; height: 72px;
      background: var(--accent-light);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
    }
    .done-title { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -0.5px; }
    .done-subtitle { font-size: 14px; color: var(--text-secondary); }

    /* Feedback Card */
    .feedback-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .feedback-section { margin-bottom: 24px; }
    .feedback-section:last-child { margin-bottom: 0; }
    .feedback-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; font-weight: 500; }

    /* Emoji Row */
    .emoji-row { display: flex; gap: 12px; }
    .emoji-btn {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px;
      padding: 16px 8px;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }
    .emoji-btn:active { transform: scale(0.96); }
    .emoji-btn.selected { border-color: var(--accent); background: var(--accent-light); }
    .emoji-btn .emoji { font-size: 32px; }
    .emoji-btn .label { font-size: 13px; color: var(--text-primary); font-weight: 500; }
    .emoji-btn.selected .label { color: var(--accent); font-weight: 600; }

    /* Count Picker */
    .count-picker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: var(--radius);
    }
    .count-btn {
      width: 44px;
      height: 44px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 50%;
      font-size: 20px;
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-weight: 600;
    }
    .count-btn:active { transform: scale(0.95); background: var(--accent-light); border-color: var(--accent); }
    .count-btn.disabled { color: var(--text-hint); cursor: not-allowed; }
    .count-value { font-size: 28px; font-weight: 700; color: var(--text-primary); min-width: 48px; text-align: center; letter-spacing: -1px; }
    .count-label { font-size: 13px; color: var(--text-secondary); text-align: center; }

    /* Text Input */
    .text-input {
      width: 100%;
      min-height: 88px;
      background: var(--bg);
      border: none;
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 14px; color: var(--text-primary);
      resize: none; outline: none; font-family: inherit;
      line-height: 1.6;
      transition: all 0.2s;
    }
    .text-input::placeholder { color: var(--text-hint); }
    .text-input:focus { background: var(--card); box-shadow: var(--shadow); }
    .input-hint { font-size: 12px; color: var(--text-hint); margin-top: 8px; display: flex; justify-content: space-between; }
    .input-hint.over-limit { color: #FF3B30; }

    /* Bottom Section */
    .bottom-section {
      position: fixed;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 12px 20px 28px;
      border-top: 1px solid var(--border);
    }
    .submit-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-hint);
      margin-bottom: 8px;
    }
    .submit-hint.hidden { display: none; }
    .btn-primary {
      width: 100%;
      background: var(--accent); color: #FFFFFF;
      border: none; border-radius: 14px;
      padding: 16px 0;
      font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary:active { background: var(--accent-dark); transform: scale(0.98); }
    .btn-primary:disabled { background: #E0E0E0; color: var(--text-hint); cursor: not-allowed; transform: none; box-shadow: none; }

    /* Loading Overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(247, 244, 240, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .loading-spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(29, 29, 31, 0.9);
      color: #FFFFFF;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      max-width: 320px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="phone-wrapper">
    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time" id="currentTime">9:41</span>
      <div class="icons"><span>📶</span><span>🔋</span></div>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="back-btn" onclick="goBack()">←</div>
      <div class="header-title">记录今日训练</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Page Content -->
    <div class="page-content">
      <div class="done-header">
        <div class="done-icon">🌱</div>
        <div class="done-title" id="doneTitle">第1天训练已完成</div>
        <div class="done-subtitle" id="doneSubtitle">-</div>
      </div>

      <!-- Feedback Form -->
      <div class="feedback-card">
        <div class="feedback-section">
          <div class="feedback-label">今天效果怎么样？</div>
          <div class="emoji-row">
            <div class="emoji-btn" onclick="selectEmoji(this, 'good')">
              <span class="emoji">😊</span>
              <span class="label">有点效果</span>
            </div>
            <div class="emoji-btn" onclick="selectEmoji(this, 'ok')">
              <span class="emoji">😐</span>
              <span class="label">不太确定</span>
            </div>
            <div class="emoji-btn" onclick="selectEmoji(this, 'hard')">
              <span class="emoji">😣</span>
              <span class="label">没效果</span>
            </div>
          </div>
        </div>

        <div class="feedback-section">
          <div class="feedback-label">今天练了几次？</div>
          <div class="count-picker" id="countPicker">
            <button class="count-btn" id="countMinus" onclick="decreaseCount()">−</button>
            <div>
              <div class="count-value" id="countValue">1</div>
              <div class="count-label">次</div>
            </div>
            <button class="count-btn" id="countPlus" onclick="increaseCount()">+</button>
          </div>
        </div>

        <div class="feedback-section">
          <div class="feedback-label">想记录什么？（选填）</div>
          <textarea class="text-input" id="noteInput" maxlength="500" placeholder="比如：今天在超市门口练习，孩子哭了两次，但最后主动伸了手..."></textarea>
          <div class="input-hint" id="noteHint">
            <span>写下来有助于发现规律</span>
            <span id="charCount">0/500</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>

    <!-- Bottom Button -->
    <div class="bottom-section">
      <div class="submit-hint" id="submitHint">请先选择效果和训练次数</div>
      <button class="btn-primary" id="submitBtn" onclick="submitFeedback()" disabled>
        <span>提交反馈</span>
        <span>✓</span>
      </button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/router.js"></script>
  <script src="js/store/userStore.js"></script>
  <script src="js/store/trainingStore.js"></script>

  <script>
    const MAX_NOTE_LENGTH = 500;
    let selectedEmoji = null;
    let selectedCount = 1;
    let scenarioId = null;
    let currentDay = 1;
    let scenarioTitle = '-';

    function updateTime() {
      const now = new Date();
      document.getElementById('currentTime').textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    function showToast(message, duration = 3000) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => { toast.classList.remove('show'); }, duration);
    }

    function selectEmoji(el, type) {
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      selectedEmoji = type;
      checkReady();
    }

    function increaseCount() {
      const max = 20;
      if (selectedCount < max) { selectedCount++; updateCountDisplay(); }
    }

    function decreaseCount() {
      if (selectedCount > 1) { selectedCount--; updateCountDisplay(); }
    }

    function updateCountDisplay() {
      document.getElementById('countValue').textContent = selectedCount;
      const minusBtn = document.getElementById('countMinus');
      const plusBtn = document.getElementById('countPlus');
      minusBtn.classList.toggle('disabled', selectedCount <= 1);
      plusBtn.classList.toggle('disabled', selectedCount >= 20);
      checkReady();
    }

    function checkReady() {
      const btn = document.getElementById('submitBtn');
      const hint = document.getElementById('submitHint');
      if (selectedEmoji && selectedCount >= 1) {
        btn.disabled = false;
        hint.classList.add('hidden');
      } else {
        btn.disabled = true;
        hint.classList.remove('hidden');
      }
    }

    function updateCharCount() {
      const input = document.getElementById('noteInput');
      const charCount = document.getElementById('charCount');
      const hint = document.getElementById('noteHint');
      const length = input.value.length;
      charCount.textContent = `${length}/${MAX_NOTE_LENGTH}`;
      hint.classList.toggle('over-limit', length >= MAX_NOTE_LENGTH);
    }

    document.getElementById('noteInput').addEventListener('input', updateCharCount);

    function goBack() { window.location.href = 'index.html'; }

    async function submitFeedback() {
      if (!selectedEmoji || !selectedCount) { showToast('请选择效果和训练次数'); return; }

      document.getElementById('loadingOverlay').classList.add('show');
      document.getElementById('submitBtn').disabled = true;

      try {
        const note = document.getElementById('noteInput').value.trim();
        const emojiMap = { 'good': '😊', 'ok': '😐', 'hard': '😣' };
        const emojiTextMap = { 'good': '有点效果', 'ok': '不太确定', 'hard': '没效果' };
        const taskId = trainingStore.getCurrentTaskId() || `${scenarioId}_D${currentDay}_T1`;

        const response = await fetch(`${getApiBase()}/api/scenarios/${scenarioId}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            scenario_id: scenarioId,
            task_id: taskId,
            day: currentDay,
            emoji: emojiMap[selectedEmoji] || '😐',
            text: '记录：' + (emojiTextMap[selectedEmoji] || ''),
            training_record: { train_count: selectedCount }
          })
        });

        if (!response.ok) { throw new Error(`请求失败: ${response.status}`); }

        const data = await response.json();
        console.log('反馈提交成功:', data);

        userStore.init();
        userStore.addTrainingRecord({
          scenario_id: scenarioId,
          day: currentDay,
          emoji: emojiMap[selectedEmoji] || '😐',
          text: '记录：' + (emojiTextMap[selectedEmoji] || ''),
          train_count: selectedCount
        });

        showToast('反馈已提交 ✓');
        setTimeout(() => {
          const aiEncouragement = data?.data?.encouragement_text || '';
          const params = new URLSearchParams({
            scenario_id: scenarioId,
            day: currentDay,
            emoji: emojiMap[selectedEmoji] || '😊',
            package_code: sessionStorage.getItem('lastPackageCode') || 'default'
          });
          if (aiEncouragement) { params.set('encouragement', encodeURIComponent(aiEncouragement)); }
          window.location.href = 'progress.html?' + params.toString();
        }, 1000);

      } catch (error) {
        console.error('提交反馈失败:', error);
        showToast('提交失败，请重试');
        document.getElementById('submitBtn').disabled = false;
      } finally {
        document.getElementById('loadingOverlay').classList.remove('show');
      }
    }

    function init() {
      window.scrollTo(0, 0);
      const urlParams = new URLSearchParams(window.location.search);
      scenarioId = urlParams.get('scenario_id') || sessionStorage.getItem('lastScenarioId');
      currentDay = parseInt(urlParams.get('day')) || parseInt(sessionStorage.getItem('lastDay')) || 1;
      scenarioTitle = sessionStorage.getItem('lastScenarioTitle') || '训练情境';

      document.getElementById('doneTitle').textContent = `第${currentDay}天训练已完成`;
      const today = new Date();
      const dateStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2, '0')}-${today.getDate().toString().padStart(2, '0')}`;
      document.getElementById('doneSubtitle').textContent = `${scenarioTitle} · ${dateStr}`;
      updateCharCount();
    }

    init();
  </script>
<!-- 鎰忚鍙嶉鎮诞鐞?-->
<script src="/static/components/feedback-widget.js"></script>
</body>
</html>
