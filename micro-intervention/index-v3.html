<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>微干预</title>
  <style>
    :root {
      --bg: #FFFFFF;
      --card: #F8F9FA;
      --primary: #1B4332;
      --accent: #40916C;
      --text: #1A1A1A;
      --text-secondary: #666666;
      --text-hint: #999999;
      --border: #E9ECEF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 顶部 */
    header {
      padding: 48px 24px 32px;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* 输入区 */
    .input-area {
      padding: 0 24px;
      flex: 1;
    }

    .input-wrapper {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
    }

    textarea {
      width: 100%;
      height: 100px;
      border: none;
      background: transparent;
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      color: var(--text);
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
    }

    textarea::placeholder {
      color: var(--text-hint);
    }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .char-hint {
      font-size: 13px;
      color: var(--text-hint);
    }

    .submit-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .submit-btn:hover {
      background: var(--primary);
    }

    .submit-btn:active {
      transform: scale(0.97);
    }

    /* 任务列表 */
    .tasks-section {
      padding: 32px 24px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .task-card:hover {
      border-color: var(--accent);
    }

    .task-card:active {
      transform: scale(0.99);
    }

    .task-scenario {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .task-goal {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .task-progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-track {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 30%;
    }

    .progress-label {
      font-size: 13px;
      color: var(--text-hint);
      min-width: 50px;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-hint);
      font-size: 14px;
    }

    /* 加载 */
    .loading {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .loading.active {
      opacity: 1;
      visibility: visible;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 16px;
      font-size: 15px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">微干预</div>
      <h1>把头疼的情境，<br>变成练习机会</h1>
      <p class="subtitle">描述一个让你烦恼的情境，我帮你生成训练方案</p>
    </header>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="input" placeholder="输入孩子的行为或情境..." maxlength="100"></textarea>
        <div class="input-footer">
          <span class="char-hint"><span id="count">0</span>/100</span>
          <button class="submit-btn" id="submit">生成训练</button>
        </div>
      </div>
    </div>

    <section class="tasks-section">
      <div class="section-title">进行中</div>
      <div class="task-card" id="taskCard">
        <div class="task-scenario">叫他名字没反应</div>
        <div class="task-goal">目标：听到名字能回头看你</div>
        <div class="task-progress">
          <div class="progress-track">
            <div class="progress-fill"></div>
          </div>
          <span class="progress-label">Day 2/7</span>
        </div>
      </div>
    </section>
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在生成训练方案...</div>
  </div>

  <script>
    const input = document.getElementById('input');
    const count = document.getElementById('count');
    const submit = document.getElementById('submit');
    const loading = document.getElementById('loading');
    const taskCard = document.getElementById('taskCard');

    input.addEventListener('input', () => {
      count.textContent = input.value.length;
      submit.style.opacity = input.value.trim() ? '1' : '0.5';
    });

    submit.addEventListener('click', () => {
      if (!input.value.trim()) return;
      loading.classList.add('active');
      setTimeout(() => {
        window.location.href = 'training.html';
      }, 1500);
    });

    taskCard.addEventListener('click', () => {
      window.location.href = 'training.html';
    });
  </script>
</body>
</html>
